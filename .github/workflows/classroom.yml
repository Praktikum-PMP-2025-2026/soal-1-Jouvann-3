name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "6 2 10 2 20 1 5 4 20 3 10 4 10"
          expected-output: |-
            FOUND 2
            NOT FOUND
            LIST 5 20
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - list kosong lalu find
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - list kosong lalu find
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1 4 7"
          expected-output: |-
            NOT FOUND
            LIST EMPTY
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - push front berulang
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - push front berulang
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 1 1 1 2 1 3 4 2"
          expected-output: |-
            FOUND 1
            LIST 3 2 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - push back berulang
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - push back berulang
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 2 1 2 2 2 3 4 2"
          expected-output: |-
            FOUND 1
            LIST 1 2 3
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - delete head
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - delete head
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 2 10 2 20 3 10 4 10"
          expected-output: |-
            NOT FOUND
            LIST 20
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - delete middle first occurrence only
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - delete middle first occurrence only
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "6 2 5 2 7 2 5 3 5 4 5 4 7"
          expected-output: |-
            FOUND 1
            FOUND 0
            LIST 7 5
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - delete non existing
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - delete non existing
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 2 1 2 2 3 9 4 2"
          expected-output: |-
            FOUND 1
            LIST 1 2
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - delete until empty
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - delete until empty
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 2 9 3 9 4 9 4 1"
          expected-output: |-
            NOT FOUND
            NOT FOUND
            LIST EMPTY
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - mixed operations
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - mixed operations
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "8 2 3 1 2 2 4 4 3 3 2 4 4 2 1 4 2"
          expected-output: |-
            FOUND 1
            FOUND 2
            FOUND 0
            LIST 2 4 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - duplicates and positions
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - duplicates and positions
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "7 2 1 2 1 2 1 4 1 3 1 4 1 4 2"
          expected-output: |-
            FOUND 0
            FOUND 0
            NOT FOUND
            LIST 1 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
